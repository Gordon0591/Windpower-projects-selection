<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>风电项目信息</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        primary: { 50: '#f0fdf4', 100: '#dcfce7', 600: '#16a34a', 700: '#15803d', 800: '#166534', 900: '#14532d' },
      }
    }
  }
}
</script>
<style>
body { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#f5f5f5; }
.status-planned { background:#f3f4f6; color:#6b7280; }
.status-approved { background:#fef3c7; color:#d97706; }
.status-bidding { background:#dbeafe; color:#2563eb; }
.status-construction { background:#fce7f3; color:#db2777; }
.status-grid_connected { background:#d1fae5; color:#059669; }
.status-completed { background:#dcfce7; color:#16a34a; }
.status-shelved { background:#fee2e2; color:#dc2626; }
.status-cancelled { background:#f3f4f6; color:#9ca3af; }
.scrollbar-hide::-webkit-scrollbar { display:none; }
</style>
</head>
<body class="text-gray-900">

<!-- 顶部导航 -->
<header class="sticky top-0 z-50 bg-primary-800 text-white shadow-md">
  <div class="max-w-4xl mx-auto px-4 h-14 flex items-center justify-between">
    <div class="flex items-center gap-2 font-bold text-lg cursor-pointer" onclick="showPage('home')">
      <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      <span>风电项目信息</span>
    </div>
    <nav class="flex items-center gap-1">
      <button onclick="showPage('home')" id="nav-home" class="px-4 py-2 rounded-lg text-sm font-medium bg-white/20">项目</button>
      <button onclick="showPage('dashboard')" id="nav-dashboard" class="px-4 py-2 rounded-lg text-sm font-medium text-white/80 hover:bg-white/10">看板</button>
    </nav>
  </div>
</header>

<main class="max-w-4xl mx-auto" id="app">
  <!-- 内容由 JS 渲染 -->
</main>

<script>
const API_BASE = '/v1';
let currentPage = 1, projects = [], hasMore = true, loading = false, filters = {};

async function api(path) {
  const res = await fetch(API_BASE + path);
  if (!res.ok) throw new Error(res.statusText);
  return res.json();
}

function fmtCap(mw) {
  if (!mw) return '--';
  return mw >= 1000 ? (mw/1000).toFixed(1) + ' GW' : mw + ' MW';
}

function fmtDate(d) {
  return d ? d.slice(0,7) : '';
}

// ===== 页面切换 =====
function showPage(name, param) {
  document.querySelectorAll('header nav button').forEach(b => {
    b.className = 'px-4 py-2 rounded-lg text-sm font-medium text-white/80 hover:bg-white/10';
  });
  if (name === 'home') document.getElementById('nav-home').className = 'px-4 py-2 rounded-lg text-sm font-medium bg-white/20';
  if (name === 'dashboard') document.getElementById('nav-dashboard').className = 'px-4 py-2 rounded-lg text-sm font-medium bg-white/20';

  const app = document.getElementById('app');
  if (name === 'home') renderHome(app);
  if (name === 'detail') renderDetail(app, param);
  if (name === 'dashboard') renderDashboard(app);
  window.scrollTo(0,0);
}

// ===== 首页 =====
// 筛选标签名映射
const FILTER_LABELS = {
  status: { approved: '核准', bidding: '招标', construction: '在建', grid_connected: '并网', completed: '完工', planned: '规划', shelved: '搁置', cancelled: '取消' },
  project_type: { onshore: '陆上风电', offshore: '海上风电' },
  tower_type: { steel: '钢塔', hybrid: '混塔' },
};
const FILTER_ORDER = ['status','project_type','tower_type','province_id','supplier','keyword'];

function getFilterLabel(key, value) {
  if (key === 'province_id') return `省份ID:${value}`;
  if (key === 'supplier') return value;
  if (key === 'keyword') return `搜索:${value}`;
  if (FILTER_LABELS[key] && FILTER_LABELS[key][value]) return FILTER_LABELS[key][value];
  return value;
}

function activeFilterCount() {
  return Object.keys(filters).length;
}

async function renderHome(el) {
  const hasFilters = activeFilterCount() > 0;
  const filterChips = Object.entries(filters).map(([k,v]) =>
    `<span class="inline-flex items-center gap-1 px-3 py-1 rounded-full text-xs font-medium bg-primary-100 text-primary-800"><span>${getFilterLabel(k,v)}</span><button onclick="event.stopPropagation();delete filters['${k}'];showPage('home')" class="ml-0.5 w-4 h-4 flex items-center justify-center rounded-full hover:bg-primary-200">&times;</button></span>`
  ).join('');

  el.innerHTML = `
    <div class="bg-white px-4 py-3 border-b border-gray-100">
      <div onclick="showSearch()" class="flex items-center gap-2 bg-gray-100 rounded-full px-4 py-2.5 text-gray-400 cursor-pointer">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <span class="text-sm">搜索项目名称、业主、供应商...</span>
      </div>
    </div>
    ${hasFilters ? `
    <div class="bg-primary-50 px-4 py-2.5 border-b border-primary-100">
      <div class="flex items-center gap-2 flex-wrap">
        <span class="text-xs text-primary-600 font-medium shrink-0">筛选:</span>
        ${filterChips}
        <button onclick="clearAllFilters()" class="shrink-0 text-xs text-gray-500 hover:text-red-500 ml-auto">清除全部</button>
      </div>
    </div>` : ''}
    <div class="bg-white border-b border-gray-100">
      <div class="flex items-center gap-2 px-4 py-3 overflow-x-auto scrollbar-hide" id="quick-filters">
        ${['核准','招标','在建','海上风电','陆上风电','混塔'].map((label,i) => {
          const map = [['status','approved'],['status','bidding'],['status','construction'],['project_type','offshore'],['project_type','onshore'],['tower_type','hybrid']];
          const [k,v] = map[i];
          return `<button onclick="toggleFilter('${k}','${v}')" class="shrink-0 px-4 py-1.5 rounded-full text-sm font-medium transition-colors ${filters[k]===v?'bg-primary-800 text-white':'bg-gray-100 text-gray-600'}" id="filter-${k}-${v}">${label}</button>`;
        }).join('')}
      </div>
      <div id="filter-panel" class="hidden px-4 pb-4 border-t border-gray-50">
        <div class="pt-3"><p class="text-xs font-semibold text-gray-500 mb-2">项目类型</p>
          <div class="flex gap-2">
            ${[['onshore','陆上风电'],['offshore','海上风电']].map(([code,name]) => `
              <button onclick="toggleFilter('project_type','${code}')" class="px-4 py-2 rounded-lg text-sm ${filters.project_type===code?'bg-green-50 text-primary-800 border border-primary-600':'bg-gray-100 text-gray-600'}">${name}</button>
            `).join('')}
          </div>
        </div>
        <div class="pt-3"><p class="text-xs font-semibold text-gray-500 mb-2">塔筒构造</p>
          <div class="flex gap-2">
            ${[['steel','钢塔'],['hybrid','混塔']].map(([code,name]) => `
              <button onclick="toggleFilter('tower_type','${code}')" class="px-4 py-2 rounded-lg text-sm ${filters.tower_type===code?'bg-green-50 text-primary-800 border border-primary-600':'bg-gray-100 text-gray-600'}">${name}</button>
            `).join('')}
          </div>
        </div>
      </div>
    </div>
    <div id="list-stats" class="px-4 py-2 text-xs text-gray-400"></div>
    <div class="px-4 pb-8" id="project-list"></div>
  `;
  await loadProjects(true);
}

function toggleFilter(key, value) {
  if (filters[key] === value) delete filters[key];
  else filters[key] = value;
  showPage('home');
}

async function loadProjects(reset) {
  if (loading) return;
  const page = reset ? 1 : currentPage;
  if (!reset && !hasMore) return;
  loading = true;

  const params = new URLSearchParams({ page, page_size: '20', ...filters });
  const res = await api('/projects?' + params.toString());
  const list = res.data || [];
  const pg = res.pagination || {};

  if (reset) projects = list;
  else projects = [...projects, ...list];
  currentPage = page;
  hasMore = page < (pg.total_pages || 0);
  loading = false;

  document.getElementById('list-stats').textContent = pg.total ? `共 ${pg.total} 个项目` : '';
  renderProjectList();
}

function renderProjectList() {
  const el = document.getElementById('project-list');
  if (!el) return;
  const statusNames = { planned:'规划', approved:'核准', bidding:'招标', construction:'在建', grid_connected:'并网', completed:'完工', shelved:'搁置', cancelled:'取消' };

  el.innerHTML = projects.map(p => {
    const typeColor = p.project_type?.code === 'offshore' ? 'bg-sky-100 text-sky-700' : 'bg-green-100 text-green-700';
    const towerName = p.tower_type?.code === 'steel' ? '钢塔' : p.tower_type?.code === 'hybrid' ? '混塔' : '待确认';
    return `
    <div onclick="showPage('detail',${p.id})" class="block bg-white rounded-2xl p-5 shadow-sm hover:shadow-md transition-shadow mb-4 cursor-pointer">
      <div class="flex items-center gap-2 mb-3">
        <span class="status-${p.status?.code} px-3 py-1 rounded-lg text-xs font-semibold">${statusNames[p.status?.code]||p.status?.code}</span>
        <span class="px-3 py-1 rounded-full text-xs font-medium ${typeColor}">${p.project_type?.code==='offshore'?'海上':'陆上'}</span>
        ${p.is_verified?'<span class="ml-auto text-green-600 text-xs font-medium">✓ 已核实</span>':''}
      </div>
      <h3 class="text-lg font-bold text-gray-900 leading-snug mb-1 line-clamp-2">${p.name}</h3>
      <p class="text-sm text-gray-400 mb-4">${p.owner||''} ${p.province?.name?'· '+p.province.name:''}</p>
      <div class="grid grid-cols-2 gap-3 mb-4">
        <div class="bg-green-50 rounded-xl p-3">
          <p class="text-xs text-green-600 mb-1">装机容量</p>
          <p class="text-xl font-bold text-green-800">${fmtCap(p.capacity_mw)}</p>
        </div>
        <div class="bg-gray-50 rounded-xl p-3">
          <p class="text-xs text-gray-500 mb-1">风机台数</p>
          <p class="text-lg font-bold text-gray-800">${p.turbine_count||'--'}<span class="text-sm font-normal text-gray-500 ml-0.5">台</span></p>
        </div>
        <div class="bg-gray-50 rounded-xl p-3">
          <p class="text-xs text-gray-500 mb-1">单机容量</p>
          <p class="text-lg font-bold text-gray-800">${p.unit_capacity_mw||'--'}<span class="text-sm font-normal text-gray-500 ml-0.5">MW</span></p>
        </div>
        <div class="bg-gray-50 rounded-xl p-3">
          <p class="text-xs text-gray-500 mb-1">塔筒构造</p>
          <p class="text-lg font-bold text-gray-800">${towerName}</p>
        </div>
      </div>
      <div class="flex items-center gap-3 text-sm text-gray-500 pt-3 border-t border-gray-100">
        ${p.turbine_supplier?`<span>${p.turbine_supplier}</span>`:''}
        ${p.investment_bn?`<span class="text-orange-600 font-semibold">${p.investment_bn}亿元</span>`:''}
        <span class="ml-auto text-xs text-gray-400">${p.approval_date?'核准 '+fmtDate(p.approval_date):''}</span>
      </div>
    </div>`;
  }).join('') + (hasMore?'<div class="text-center py-4"><button onclick="loadMore()" class="text-sm text-gray-500">加载更多</button></div>':'') + (!hasMore&&projects.length>0?'<div class="text-center py-4 text-sm text-gray-400">— 已加载全部 —</div>':'') + (!loading&&projects.length===0?'<div class="flex flex-col items-center py-20 text-gray-400"><span class="text-4xl mb-3">📭</span><p class="text-lg">暂无匹配的项目</p></div>':'');
}

function loadMore() { loadProjects(false); }

function showSearch() {
  const kw = prompt('请输入搜索关键词：');
  if (kw) {
    filters = { keyword: kw };
    showPage('home');
  }
}

// ===== 详情页 =====
async function renderDetail(el, id) {
  el.innerHTML = '<div class="flex justify-center py-20 text-gray-400"><div class="animate-spin h-6 w-6 border-2 border-primary-600 border-t-transparent rounded-full"></div></div>';
  const res = await api('/projects/' + id);
  const p = res.data;
  const towerName = p.tower_type?.code === 'steel' ? '钢塔' : p.tower_type?.code === 'hybrid' ? '混塔' : '待确认';

  el.innerHTML = `
    <div class="bg-white px-4 py-3 border-b border-gray-100">
      <button onclick="showPage('home')" class="flex items-center gap-1 text-sm text-gray-500">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        <span>返回列表</span>
      </button>
    </div>
    <div class="bg-white px-5 py-6">
      <div class="flex items-center gap-2 mb-3">
        <span class="status-${p.status?.code} px-3 py-1 rounded-lg text-xs font-semibold">${p.status?.name}</span>
        ${p.project_type?.code==='offshore'?'<span class="px-3 py-1 rounded-full text-xs bg-sky-100 text-sky-700 font-medium">海上风电</span>':'<span class="px-3 py-1 rounded-full text-xs bg-green-100 text-green-700 font-medium">陆上风电</span>'}
      </div>
      <h1 class="text-xl font-bold text-gray-900 leading-snug mb-2">${p.name}</h1>
      ${p.province?`<p class="flex items-center gap-1 text-sm text-gray-400">📍 ${p.province.name} · ${p.province.region}</p>`:''}
    </div>
    <div class="bg-white px-5 py-5 mt-3">
      <div class="grid grid-cols-2 gap-3">
        <div class="bg-green-50 rounded-xl p-4"><p class="text-xs text-green-600 mb-1">装机容量</p><p class="text-2xl font-bold text-green-800">${fmtCap(p.capacity_mw)}</p></div>
        <div class="bg-gray-50 rounded-xl p-4"><p class="text-xs text-gray-500 mb-1">风机台数</p><p class="text-xl font-bold text-gray-800">${p.turbine_count||'--'}<span class="text-sm font-normal text-gray-500 ml-1">台</span></p></div>
        <div class="bg-gray-50 rounded-xl p-4"><p class="text-xs text-gray-500 mb-1">单机容量</p><p class="text-xl font-bold text-gray-800">${p.unit_capacity_mw||'--'}<span class="text-sm font-normal text-gray-500 ml-1">MW</span></p></div>
        <div class="bg-gray-50 rounded-xl p-4"><p class="text-xs text-gray-500 mb-1">塔筒构造</p><p class="text-xl font-bold text-gray-800">${towerName}</p></div>
      </div>
    </div>
    <div class="bg-white px-5 py-5 mt-3">
      <h2 class="text-base font-bold text-gray-900 pb-3 border-b border-gray-100 mb-3">📋 项目信息</h2>
      ${p.owner?`<div class="flex py-3 border-b border-gray-50"><span class="w-28 text-sm text-gray-400 shrink-0">业主/开发商</span><span class="text-sm text-gray-800 font-medium">${p.owner}</span></div>`:''}
      ${p.turbine_supplier?`<div class="flex py-3 border-b border-gray-50"><span class="w-28 text-sm text-gray-400 shrink-0">风机供应商</span><span class="text-sm text-gray-800 font-medium">${p.turbine_supplier}</span></div>`:''}
      ${p.investment_bn?`<div class="flex py-3 border-b border-gray-50"><span class="w-28 text-sm text-gray-400 shrink-0">投资金额</span><span class="text-sm text-orange-600 font-bold">${p.investment_bn} 亿元</span></div>`:''}
      ${p.description?`<div class="flex py-3"><span class="w-28 text-sm text-gray-400 shrink-0">项目描述</span><span class="text-sm text-gray-600 leading-relaxed">${p.description}</span></div>`:''}
    </div>
    ${(p.approval_date||p.construction_start_date||p.planned_cod_date||p.completion_date)?`
    <div class="bg-white px-5 py-5 mt-3">
      <h2 class="text-base font-bold text-gray-900 pb-3 border-b border-gray-100 mb-3">📅 关键节点</h2>
      <div class="space-y-4">
        ${p.approval_date?`<div class="flex items-start gap-3"><div class="w-3 h-3 rounded-full bg-gray-300 mt-1.5 shrink-0"></div><div><p class="text-sm font-semibold text-gray-800">核准批复</p><p class="text-xs text-gray-400 mt-0.5">${p.approval_date}</p></div></div>`:''}
        ${p.construction_start_date?`<div class="flex items-start gap-3"><div class="w-3 h-3 rounded-full bg-gray-300 mt-1.5 shrink-0"></div><div><p class="text-sm font-semibold text-gray-800">主体开工</p><p class="text-xs text-gray-400 mt-0.5">${p.construction_start_date}</p></div></div>`:''}
        ${p.planned_cod_date?`<div class="flex items-start gap-3"><div class="w-3 h-3 rounded-full bg-blue-400 mt-1.5 shrink-0"></div><div><p class="text-sm font-semibold text-gray-800">计划并网</p><p class="text-xs text-blue-500 mt-0.5">${p.planned_cod_date}</p></div></div>`:''}
        ${p.completion_date?`<div class="flex items-start gap-3"><div class="w-3 h-3 rounded-full bg-green-500 mt-1.5 shrink-0"></div><div><p class="text-sm font-semibold text-gray-800">完工/全容量并网</p><p class="text-xs text-green-600 mt-0.5">${p.completion_date}</p></div></div>`:''}
      </div>
    </div>`:''}
    ${p.sources?.length?`
    <div class="bg-orange-50 px-5 py-5 mt-3">
      <h2 class="text-base font-bold text-gray-900 pb-3 border-b border-orange-100 mb-2">📡 信息来源</h2>
      <p class="text-xs text-gray-400 mb-3">以下为本项目信息的数据采集来源</p>
      <div class="space-y-2">
        ${p.sources.map(s=>`
        <div class="bg-white rounded-lg p-3 border border-orange-200">
          <p class="text-sm font-semibold text-gray-800">${s.source_name}</p>
          ${s.source_url?`<p class="text-xs text-blue-500 mt-1 break-all">${s.source_url}</p>`:''}
          ${s.captured_at?`<p class="text-xs text-gray-400 mt-1">采集于 ${s.captured_at.slice(0,10)}</p>`:''}
        </div>`).join('')}
      </div>
    </div>`:''}
    <div style="height:40px"></div>
  `;
}

// ===== 从看板筛选 =====
function filterFromDashboard(filterObj) {
  filters = filterObj;
  showPage('home');
}

// ===== 看板 =====
async function renderDashboard(el) {
  el.innerHTML = '<div class="flex justify-center py-20 text-gray-400"><div class="animate-spin h-6 w-6 border-2 border-primary-600 border-t-transparent rounded-full"></div></div>';
  const [ov, pr, su] = await Promise.all([api('/stats/overview'), api('/stats/by-province'), api('/stats/supplier-ranking')]);
  const data = ov.data || {};
  const provinces = (pr.data||[]).slice(0,10);
  const suppliers = (su.data||[]).slice(0,10);
  const byStatus = data.by_status || {};

  el.innerHTML = `
    <div class="px-4 py-4 pb-10 space-y-4">
      <div class="grid grid-cols-3 gap-3">
        <div class="bg-white rounded-xl p-4 shadow-sm"><p class="text-2xl font-bold text-primary-800">${data.total_projects||0}</p><p class="text-xs text-gray-400 mt-1">项目总数</p></div>
        <div class="bg-white rounded-xl p-4 shadow-sm"><p class="text-2xl font-bold text-blue-600">${fmtCap(data.total_capacity_mw)}</p><p class="text-xs text-gray-400 mt-1">总装机容量</p></div>
        <div class="bg-white rounded-xl p-4 shadow-sm"><p class="text-2xl font-bold text-sky-600">${data.total_turbines||0}</p><p class="text-xs text-gray-400 mt-1">风机总台数</p></div>
      </div>
      <div class="bg-white rounded-xl p-5 shadow-sm">
        <h3 class="text-sm font-bold text-gray-900 pb-3 border-b border-gray-100 mb-3">📊 项目状态分布 <span class="text-xs font-normal text-gray-400 ml-1">— 点击筛选</span></h3>
        <div class="space-y-2">
          ${['approved','bidding','construction','grid_connected','completed'].map(code=>{
            const name={approved:'核准',bidding:'招标',construction:'在建',grid_connected:'并网',completed:'完工'}[code];
            const d=byStatus[code]||{count:0,capacity_mw:0};
            const totalCap=data.total_capacity_mw||1;
            const pct=totalCap>0?(d.capacity_mw/totalCap*100).toFixed(0):0;
            return `<div onclick="filterFromDashboard({status:'${code}'})" class="flex items-center gap-3 cursor-pointer hover:bg-gray-50 rounded-lg px-2 py-1 transition-colors"><span class="w-12 text-sm text-gray-600 shrink-0">${name}</span><div class="flex-1 h-2 bg-gray-100 rounded-full overflow-hidden"><div class="h-full rounded-full status-${code}" style="width:${pct}%;opacity:0.7"></div></div><span class="w-20 text-right text-sm text-gray-500 shrink-0">${fmtCap(d.capacity_mw)}</span><span class="text-xs text-gray-300 ml-1">${d.count||0}个</span></div>`;
          }).join('')}
        </div>
      </div>
      <div class="bg-white rounded-xl p-5 shadow-sm">
        <h3 class="text-sm font-bold text-gray-900 pb-3 border-b border-gray-100 mb-3">🗺️ 省份装机 Top 10 <span class="text-xs font-normal text-gray-400 ml-1">— 点击筛选</span></h3>
        <div class="space-y-2">
          ${provinces.map((p,i)=>`<div onclick="filterFromDashboard({province_id:'${p.province_id}'})" class="flex items-center gap-3 cursor-pointer hover:bg-gray-50 rounded-lg px-2 py-1 transition-colors"><span class="w-6 text-sm font-bold text-gray-400 shrink-0">${i+1}</span><span class="flex-1 text-sm text-gray-700">${p.province_name}</span><span class="text-sm font-bold text-primary-700 shrink-0">${fmtCap(p.total_capacity_mw)}</span></div>`).join('')}
        </div>
      </div>
      <div class="bg-white rounded-xl p-5 shadow-sm">
        <h3 class="text-sm font-bold text-gray-900 pb-3 border-b border-gray-100 mb-3">🏭 供应商排名 <span class="text-xs font-normal text-gray-400 ml-1">— 点击筛选</span></h3>
        <div class="space-y-3">
          ${suppliers.map((s,i)=>`<div onclick="filterFromDashboard({supplier:'${s.supplier.replace(/'/g,"\\'")}'})" class="flex items-center gap-3 cursor-pointer hover:bg-gray-50 rounded-lg px-2 py-1 transition-colors"><span class="w-6 text-sm font-bold text-gray-400 shrink-0">${i+1}</span><div class="flex-1 min-w-0"><p class="text-sm font-medium text-gray-800 truncate">${s.supplier}</p><p class="text-xs text-gray-400">${s.project_count}个项目 · ${s.total_turbines}台风机</p></div><span class="text-sm font-bold text-primary-700 shrink-0">${fmtCap(s.total_capacity_mw)}</span></div>`).join('')}
        </div>
      </div>
    </div>
  `;
}

// ===== 清除筛选 =====
function clearAllFilters() {
  filters = {};
  showPage('home');
}

// 初始化
showPage('home');
</script>
</body>
</html>
