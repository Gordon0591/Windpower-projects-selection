// ====== 内存 API（模拟后端）======
const ALL_DATA = SAMPLE_DATA;

function api(path) {
  return new Promise(resolve => {
    setTimeout(() => {
      // GET /v1/projects?page=&page_size=&...filters
      const listMatch = path.match(/^\/v1\/projects\?(.+)$/);
      if (listMatch) {
        const params = new URLSearchParams(listMatch[1]);
        let filtered = [...ALL_DATA];
        // 筛选
        const status = params.get('status');
        const projectType = params.get('project_type');
        const towerType = params.get('tower_type');
        const provinceId = params.get('province_id');
        const supplier = params.get('supplier');
        const keyword = params.get('keyword');
        if (status) filtered = filtered.filter(p => p.status.code === status);
        if (projectType) filtered = filtered.filter(p => p.project_type.code === projectType);
        if (towerType) filtered = filtered.filter(p => p.tower_type.code === towerType);
        if (provinceId) filtered = filtered.filter(p => p.province.id === parseInt(provinceId));
        if (supplier) filtered = filtered.filter(p => p.turbine_supplier === supplier);
        if (keyword) {
          const kw = keyword.toLowerCase();
          filtered = filtered.filter(p => p.name.includes(kw) || (p.owner||'').includes(kw) || (p.turbine_supplier||'').includes(kw));
        }
        const page = parseInt(params.get('page')||'1');
        const pageSize = parseInt(params.get('page_size')||'20');
        const total = filtered.length;
        const totalPages = Math.ceil(total / pageSize);
        const start = (page-1) * pageSize;
        const data = filtered.slice(start, start + pageSize);
        return resolve({ code:0, message:"success", data, pagination:{ page, page_size:pageSize, total, total_pages:totalPages } });
      }
      // GET /v1/projects/:id
      const detailMatch = path.match(/^\/v1\/projects\/(\d+)$/);
      if (detailMatch) {
        const id = parseInt(detailMatch[1]);
        const p = ALL_DATA.find(p => p.id === id);
        return resolve({ code:0, message:"success", data: p || null });
      }
      // GET /v1/stats/overview
      if (path === '/v1/stats/overview') {
        const byStatus = {};
        const byType = {};
        const byTower = {};
        let totalCap = 0, totalTurbines = 0;
        ALL_DATA.forEach(p => {
          totalCap += p.capacity_mw;
          totalTurbines += p.turbine_count||0;
          const s = p.status.code;
          const t = p.project_type.code;
          const tw = p.tower_type.code;
          if (!byStatus[s]) byStatus[s] = {count:0,capacity_mw:0};
          byStatus[s].count++; byStatus[s].capacity_mw += p.capacity_mw;
          if (!byType[t]) byType[t] = {count:0,capacity_mw:0};
          byType[t].count++; byType[t].capacity_mw += p.capacity_mw;
          if (!byTower[tw]) byTower[tw] = {count:0,capacity_mw:0};
          byTower[tw].count++; byTower[tw].capacity_mw += p.capacity_mw;
        });
        return resolve({ code:0, message:"success", data: {
          total_projects: ALL_DATA.length, total_capacity_mw: totalCap, total_turbines: totalTurbines,
          by_status: byStatus, by_type: byType, by_tower_type: byTower,
          this_year: { new_approved_mw: 1950, new_construction_mw: 3500, new_completed_mw: 2300 }
        }});
      }
      // GET /v1/stats/by-province
      if (path === '/v1/stats/by-province') {
        const map = {};
        ALL_DATA.forEach(p => {
          const pid = p.province.id;
          if (!map[pid]) map[pid] = {province_id:pid,province_name:p.province.name,province_region:p.province.region,project_count:0,total_capacity_mw:0,total_turbines:0,onshore_mw:0,offshore_mw:0};
          map[pid].project_count++;
          map[pid].total_capacity_mw += p.capacity_mw;
          map[pid].total_turbines += p.turbine_count||0;
          if (p.project_type.code==='offshore') map[pid].offshore_mw += p.capacity_mw;
          else map[pid].onshore_mw += p.capacity_mw;
        });
        return resolve({ code:0, message:"success", data: Object.values(map).sort((a,b) => b.total_capacity_mw - a.total_capacity_mw) });
      }
      // GET /v1/stats/supplier-ranking
      if (path === '/v1/stats/supplier-ranking') {
        const map = {};
        ALL_DATA.forEach(p => {
          const s = p.turbine_supplier;
          if (!s || s==='待定') return;
          if (!map[s]) map[s] = {supplier:s,project_count:0,total_capacity_mw:0,total_turbines:0};
          map[s].project_count++;
          map[s].total_capacity_mw += p.capacity_mw;
          map[s].total_turbines += p.turbine_count||0;
        });
        return resolve({ code:0, message:"success", data: Object.values(map).sort((a,b) => b.total_capacity_mw - a.total_capacity_mw) });
      }
      return resolve({ code:0, message:"success", data: null });
    }, 100); // 模拟网络延迟
  });
}

// ====== 工具函数 ======
function fmtCap(mw) {
  if (!mw) return '--';
  return mw >= 1000 ? (mw/1000).toFixed(1) + ' GW' : mw + ' MW';
}
function fmtDate(d) {
  return d ? d.slice(0,7) : '';
}

// ====== 页面状态 ======
let currentPage = 1, projects = [], hasMore = true, loading = false, filters = {};

const FILTER_LABELS = {
  status: { approved:'核准', bidding:'招标', construction:'在建', grid_connected:'并网', completed:'完工', planned:'规划', shelved:'搁置', cancelled:'取消' },
  project_type: { onshore:'陆上风电', offshore:'海上风电' },
  tower_type: { steel:'钢塔', hybrid:'混塔' },
};

function getFilterLabel(key, value) {
  if (key === 'province_id') return '省份ID:'+value;
  if (key === 'supplier') return value;
  if (key === 'keyword') return '搜索:'+value;
  if (FILTER_LABELS[key] && FILTER_LABELS[key][value]) return FILTER_LABELS[key][value];
  return value;
}

function activeFilterCount() { return Object.keys(filters).length; }

// ====== 页面切换 ======
function showPage(name, param) {
  document.querySelectorAll('header nav button').forEach(b => {
    b.className = 'px-4 py-2 rounded-lg text-sm font-medium text-white/80 hover:bg-white/10';
  });
  if (name === 'home') document.getElementById('nav-home').className = 'px-4 py-2 rounded-lg text-sm font-medium bg-white/20';
  if (name === 'dashboard') document.getElementById('nav-dashboard').className = 'px-4 py-2 rounded-lg text-sm font-medium bg-white/20';
  const app = document.getElementById('app');
  if (name === 'home') renderHome(app);
  if (name === 'detail') renderDetail(app, param);
  if (name === 'dashboard') renderDashboard(app);
  window.scrollTo(0,0);
}

// ====== 首页 ======
async function renderHome(el) {
  const hasFilters = activeFilterCount() > 0;
  const filterChips = Object.entries(filters).map(([k,v]) =>
    `<span class="inline-flex items-center gap-1 px-3 py-1 rounded-full text-xs font-medium bg-primary-100 text-primary-800"><span>${getFilterLabel(k,v)}</span><button onclick="event.stopPropagation();delete filters['${k}'];showPage('home')" class="ml-0.5 w-4 h-4 flex items-center justify-center rounded-full hover:bg-primary-200">&times;</button></span>`
  ).join('');

  el.innerHTML = `
    <div class="bg-white px-4 py-3 border-b border-gray-100">
      <div onclick="showSearch()" class="flex items-center gap-2 bg-gray-100 rounded-full px-4 py-2.5 text-gray-400 cursor-pointer">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <span class="text-sm">搜索项目名称、业主、供应商...</span>
      </div>
    </div>
    ${hasFilters ? `
    <div class="bg-primary-50 px-4 py-2.5 border-b border-primary-100">
      <div class="flex items-center gap-2 flex-wrap">
        <span class="text-xs text-primary-600 font-medium shrink-0">筛选:</span>
        ${filterChips}
        <button onclick="clearAllFilters()" class="shrink-0 text-xs text-gray-500 hover:text-red-500 ml-auto">清除全部</button>
      </div>
    </div>` : ''}
    <div class="bg-white border-b border-gray-100">
      <div class="flex items-center gap-2 px-4 py-3 overflow-x-auto scrollbar-hide" id="quick-filters">
        ${['核准','招标','在建','海上风电','陆上风电','混塔'].map((label,i) => {
          const map = [['status','approved'],['status','bidding'],['status','construction'],['project_type','offshore'],['project_type','onshore'],['tower_type','hybrid']];
          const [k,v] = map[i];
          return `<button onclick="toggleFilter('${k}','${v}')" class="shrink-0 px-4 py-1.5 rounded-full text-sm font-medium transition-colors ${filters[k]===v?'bg-primary-800 text-white':'bg-gray-100 text-gray-600'}">${label}</button>`;
        }).join('')}
      </div>
    </div>
    <div id="list-stats" class="px-4 py-2 text-xs text-gray-400"></div>
    <div class="px-4 pb-8" id="project-list"></div>
  `;
  await loadProjects(true);
}

function toggleFilter(key, value) {
  if (filters[key] === value) delete filters[key];
  else filters[key] = value;
  showPage('home');
}

async function loadProjects(reset) {
  if (loading) return;
  const page = reset ? 1 : currentPage;
  if (!reset && !hasMore) return;
  loading = true;
  const params = new URLSearchParams({ page, page_size:'20', ...filters });
  const res = await api('/v1/projects?' + params.toString());
  const list = res.data || [];
  const pg = res.pagination || {};
  if (reset) projects = list;
  else projects = [...projects, ...list];
  currentPage = page;
  hasMore = page < (pg.total_pages || 0);
  loading = false;
  document.getElementById('list-stats').textContent = pg.total ? '共 ' + pg.total + ' 个项目' : '';
  renderProjectList();
}

function renderProjectList() {
  const el = document.getElementById('project-list');
  if (!el) return;
  const statusNames = { planned:'规划', approved:'核准', bidding:'招标', construction:'在建', grid_connected:'并网', completed:'完工', shelved:'搁置', cancelled:'取消' };
  el.innerHTML = projects.map(p => {
    const typeColor = p.project_type?.code === 'offshore' ? 'bg-sky-100 text-sky-700' : 'bg-green-100 text-green-700';
    const towerName = p.tower_type?.code === 'steel' ? '钢塔' : p.tower_type?.code === 'hybrid' ? '混塔' : '待确认';
    return `
    <div onclick="showPage('detail',${p.id})" class="block bg-white rounded-2xl p-5 shadow-sm hover:shadow-md transition-shadow mb-4 cursor-pointer">
      <div class="flex items-center gap-2 mb-3">
        <span class="status-${p.status?.code} px-3 py-1 rounded-lg text-xs font-semibold">${statusNames[p.status?.code]||p.status?.code}</span>
        <span class="px-3 py-1 rounded-full text-xs font-medium ${typeColor}">${p.project_type?.code==='offshore'?'海上':'陆上'}</span>
        ${p.is_verified?'<span class="ml-auto text-green-600 text-xs font-medium">✓ 已核实</span>':''}
      </div>
      <h3 class="text-lg font-bold text-gray-900 leading-snug mb-1 line-clamp-2">${p.name}</h3>
      <p class="text-sm text-gray-400 mb-4">${p.owner||''} ${p.province?.name?'· '+p.province.name:''}</p>
      <div class="grid grid-cols-2 gap-3 mb-4">
        <div class="bg-green-50 rounded-xl p-3"><p class="text-xs text-green-600 mb-1">装机容量</p><p class="text-xl font-bold text-green-800">${fmtCap(p.capacity_mw)}</p></div>
        <div class="bg-gray-50 rounded-xl p-3"><p class="text-xs text-gray-500 mb-1">风机台数</p><p class="text-lg font-bold text-gray-800">${p.turbine_count||'--'}<span class="text-sm font-normal text-gray-500 ml-0.5">台</span></p></div>
        <div class="bg-gray-50 rounded-xl p-3"><p class="text-xs text-gray-500 mb-1">单机容量</p><p class="text-lg font-bold text-gray-800">${p.unit_capacity_mw||'--'}<span class="text-sm font-normal text-gray-500 ml-0.5">MW</span></p></div>
        <div class="bg-gray-50 rounded-xl p-3"><p class="text-xs text-gray-500 mb-1">塔筒构造</p><p class="text-lg font-bold text-gray-800">${towerName}</p></div>
      </div>
      <div class="flex items-center gap-3 text-sm text-gray-500 pt-3 border-t border-gray-100">
        ${p.turbine_supplier?`<span>${p.turbine_supplier}</span>`:''}
        ${p.investment_bn?`<span class="text-orange-600 font-semibold">${p.investment_bn}亿元</span>`:''}
        <span class="ml-auto text-xs text-gray-400">${p.approval_date?'核准 '+fmtDate(p.approval_date):''}</span>
      </div>
    </div>`;
  }).join('') + (hasMore?'<div class="text-center py-4"><button onclick="loadMore()" class="text-sm text-gray-500">加载更多</button></div>':'') + (!hasMore&&projects.length>0?'<div class="text-center py-4 text-sm text-gray-400">— 已加载全部 —</div>':'') + (!loading&&projects.length===0?'<div class="flex flex-col items-center py-20 text-gray-400"><span class="text-4xl mb-3">📭</span><p class="text-lg">暂无匹配的项目</p></div>':'');
}

function loadMore() { loadProjects(false); }

function showSearch() {
  const kw = prompt('请输入搜索关键词：');
  if (kw) { filters = { keyword: kw }; showPage('home'); }
}

  const provinces = (pr.data||[]).slice(0,10);
  const suppliers = (su.data||[]).slice(0,10);
  const byStatus = data.by_status || {};

  el.innerHTML = `
    <div class="px-4 py-4 pb-10 space-y-4">
      <div class="grid grid-cols-3 gap-3">
        <div class="bg-white rounded-xl p-4 shadow-sm"><p class="text-2xl font-bold text-primary-800">${data.total_projects||0}</p><p class="text-xs text-gray-400 mt-1">项目总数</p></div>
        <div class="bg-white rounded-xl p-4 shadow-sm"><p class="text-2xl font-bold text-blue-600">${fmtCap(data.total_capacity_mw)}</p><p class="text-xs text-gray-400 mt-1">总装机容量</p></div>
        <div class="bg-white rounded-xl p-4 shadow-sm"><p class="text-2xl font-bold text-sky-600">${data.total_turbines||0}</p><p class="text-xs text-gray-400 mt-1">风机总台数</p></div>
      </div>
      <div class="bg-white rounded-xl p-5 shadow-sm">
        <h3 class="text-sm font-bold text-gray-900 pb-3 border-b border-gray-100 mb-3">📊 项目状态分布 <span class="text-xs font-normal text-gray-400 ml-1">— 点击筛选</span></h3>
        <div class="space-y-2">
          ${['approved','bidding','construction','grid_connected','completed'].map(code=>{
            const name={approved:'核准',bidding:'招标',construction:'在建',grid_connected:'并网',completed:'完工'}[code];
            const d=byStatus[code]||{count:0,capacity_mw:0};

          }).join('')}

      <div class="bg-white rounded-xl p-5 shadow-sm">
        <h3 class="text-sm font-bold text-gray-900 pb-3 border-b border-gray-100 mb-3">🗺️ 省份装机 Top 10 <span class="text-xs font-normal text-gray-400 ml-1">— 点击筛选</span></h3>

          ${provinces.map((p,i)=>`<div onclick="filterFromDashboard({province_id:'${p.province_id}'})" class="flex items-center gap-3 cursor-pointer hover:bg-gray-50 rounded-lg px-2 py-1 transition-colors"><span class="w-6 text-sm font-bold text-gray-400 shrink-0">${i+1}</span><span class="flex-1 text-sm text-gray-700">${p.province_name}</span><span class="text-sm font-bold text-primary-700 shrink-0">${fmtCap(p.total_capacity_mw)}</span></div>`).join('')}

        <div class="space-y-3">

function clearAllFilters() { filters = {}; showPage('home'); }

// ====== 启动 ======
showPage('home');
